name: Publish From Fork (Quick)

on:
  workflow_dispatch:

concurrency:
  group: fork-publish-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Build and Push (fork)
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHORT="${GITHUB_SHA::12}"
          TAGS="${IMAGE}:fork-${SHORT},${IMAGE}:sha-${SHORT}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image (amd64)
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image manifest (anonymous token)
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="fork-${GITHUB_SHA::12}"
          token_resp="$(curl -sS "https://ghcr.io/token?scope=repository:${REPO}:pull")"
          token="$(echo "$token_resp" | sed -n 's/.*"token":"\([^\"]*\)".*/\1/p')"
          if [ -z "$token" ]; then
            echo "Anonymous token missing; skipping manifest check"
            exit 0
          fi
          code="$(curl -sS -o /tmp/ghcr-man.json -w "%{http_code}" -H "Authorization: Bearer ${token}" -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.v2+json" "https://ghcr.io/v2/${REPO}/manifests/${TAG}")"
          if [ "$code" != "200" ]; then
            echo "Manifest fetch failed with HTTP $code"
            cat /tmp/ghcr-man.json || true
            exit 1
          fi
          echo "Manifest available for ${REPO}:${TAG}"
