api_key = "sk-1Jcm-SnxwQJfSPFWPckOJA"
default_provider = "custom:http://litellm.k3s"
default_model = "copilot/gpt-5-mini"
default_temperature = 0.7
model_routes = []
embedding_routes = []

[cluster]
enabled = true
node_name = "node-2"
bind_host = "127.0.0.1"
bind_port = 9001
node_token = "secret"
peers = ["127.0.0.1:9000"]
discovery_enabled = false
discovery_interval_secs = 3

[observability]
backend = "none"
runtime_trace_mode = "none"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = [
    "git",
    "npm",
    "cargo",
    "ls",
    "cat",
    "grep",
    "find",
    "echo",
    "pwd",
    "wc",
    "head",
    "tail",
    "date",
]
forbidden_paths = [
    "/etc",
    "/root",
    "/home",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
    "/tmp",
    "~/.ssh",
    "~/.gnupg",
    "~/.aws",
    "~/.config",
]
max_actions_per_hour = 20
max_cost_per_day_cents = 500
require_approval_for_medium_risk = true
block_high_risk_commands = true
shell_env_passthrough = []
auto_approve = [
    "file_read",
    "memory_recall",
]
always_ask = []
allowed_roots = []
non_cli_excluded_tools = []

[security.sandbox]
backend = "auto"
firejail_args = []

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 60
max_subprocesses = 10
memory_monitoring = true

[security.audit]
enabled = true
log_path = "audit.log"
max_size_mb = 100
sign_events = false

[security.otp]
enabled = false
method = "totp"
token_ttl_secs = 30
cache_valid_secs = 300
gated_actions = [
    "shell",
    "file_write",
    "browser_open",
]

[security.leak_detection]
enabled = true
allowed_patterns = []

[security.prompt_guard]
enabled = false

[memory]
backend = "markdown"
auto_save = true

[storage.provider]
backend = "local"

[gateway]
host = "127.0.0.1"
port = 8081
require_pairing = true
pair_rate_limit_per_minute = 5
allow_public_bind = true

[hooks]
enabled = false

[tunnel]
provider = "none"

[composio]
enabled = false

[http_request]
enabled = true
timeout_secs = 30
max_response_bytes = 1048576
allowed_endpoints = []

[browser]
enabled = false

[cost]
enabled = false

[daemon]
enabled = false
